name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...

  build-matrix:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - { goos: windows, goarch: amd64 }
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Cross-compile
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          out=conduit-tunnel-${GOOS}-${GOARCH}
          [ "$GOOS" = "windows" ] && out="$out.exe"
          go build -trimpath -ldflags="-s -w" -o "dist/$out" ./cmd/conduit-tunnel
          ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: conduit-tunnel-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
