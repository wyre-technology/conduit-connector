name: Release

# Publishes cross-compiled binaries as GitHub Release assets when a v* tag is
# pushed, so install.sh (and RMM fleet deploys) can pull a pinned version.
# Windows binaries are UNSIGNED here — Authenticode signing lands with the
# Azure Artifact Signing cert (M-E); until then the Windows asset is provided
# as-is for testing, not production.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the release + upload assets

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cross-compile all targets
        run: |
          set -euo pipefail
          mkdir -p dist
          version="${GITHUB_REF_NAME}"
          for target in linux/amd64 linux/arm64 windows/amd64; do
            goos="${target%/*}"; goarch="${target#*/}"
            out="conduit-connector-${goos}-${goarch}"
            [ "$goos" = "windows" ] && out="${out}.exe"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -trimpath -ldflags="-s -w -X main.version=${version}" \
              -o "dist/${out}" ./cmd/conduit-connector
          done
          ( cd dist && sha256sum conduit-connector-* > SHA256SUMS )
          ls -la dist/

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*
